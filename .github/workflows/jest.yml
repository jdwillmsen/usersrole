name: Jest
on:
  push:
    branches-ignore:
      - main
jobs:
  jest:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v3
      - name: Create Environment File
        run: node server.js
        env:
          ENVIRONMENT_FILE: '${{ secrets.ENVIRONMENT_FILE }}'
          ALLOW_ENV_TEMPLATE_FALLBACK: 'true'
      - name: Install Dependencies
        run: npm ci
      - name: Jests Tests
        run: npm run jest
